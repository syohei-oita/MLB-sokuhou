name: Send MLB Stats Daily Email

on:
  schedule:
    # 日本時間の日曜日・月曜日の 11:00 と 15:00 (UTC 2:00, 6:00) に実行
    # ※GitHub Actionsの仕様により、開始時間が数分〜数十分前後することがあります。
    - cron: '0 2,6 * * 0,1'
    # 日本時間の火曜日〜土曜日の 13:00 と 17:00 (UTC 4:00, 8:00) に実行
    - cron: '0 4,8 * * 2-6'
  workflow_dispatch:
    # GitHubの管理画面から手動でいつでも実行可能にするための設定

permissions:
  contents: write # リポジトリへの書き込み権限（git push）を許可

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
    # 1. GitHubサーバー上にリポジトリのプログラム一式を取り込む
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. Python環境の立ち上げ
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    # 3. 必要な外部ライブラリをインストール
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. メール送信プログラムの実行
    - name: Run MLB email script
      env:
        # GitHubのSecrets（安全に保管された秘密情報）から環境変数へ受け渡す
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
      run: python send_mlb_email.py

    # 5. 生成された成績データをリポジトリに保存
    - name: Commit and push data files
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add web_ui/data/
        # 変更がなければcommitしないようにエラーハンドリング
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update MLB stats data" && git push)

    # 6. web_ui/ フォルダを GitHub Pages（gh-pagesブランチ）に公開
    #    → Netlifyの代わりに、GitHubが無料・無制限でWebサイトを配信します
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./web_ui
        commit_message: "Auto-deploy MLB stats to GitHub Pages"

name: Send MLB Stats Daily Email

on:
  schedule:
    # 日本時間 17:00 は UTC 8:00 (17 - 9 = 8)
    # ※GitHub Actionsの仕様により、開始時間が数分〜数十分前後することがあります。
    - cron: '0 8 * * *'
  workflow_dispatch:
    # GitHubの管理画面から手動でいつでも実行可能にするための設定

permissions:
  contents: write # リポジトリへの書き込み権限（git push）を許可

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
    # 1. GitHubサーバー上にリポジトリのプログラム一式を取り込む
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. Python環境の立ち上げ
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    # 3. 必要な外部ライブラリをインストール
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. メール送信プログラムの実行
    - name: Run MLB email script
      env:
        # GitHubのSecrets（安全に保管された秘密情報）から環境変数へ受け渡す
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
      run: python send_mlb_email.py

    # 5. 生成された成績データをリポジトリに保存（Netlifyへの連携用）
    - name: Commit and push data files
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add web_ui/data/
        # 変更がなければcommitしないようにエラーハンドリング
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update MLB stats data" && git push)
